name: Refresh prompt-improver rating

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Actualizar rating desde el Worker
        run: python3 scripts/refresh-rating.py

      - name: Commit si hay cambios
        run: |
          if git diff --quiet; then
            echo "Sin cambios en el rating, no se hace commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html en/index.html fr/index.html ca/index.html
            git commit -m "chore: refresh prompt-improver rating (automated)"
            git push
          fi
